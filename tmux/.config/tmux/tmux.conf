source-file ~/.config/tmux/tmux.reset.conf
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -g allow-passthrough on
set -g mouse on

if-shell 'command -v zsh > /dev/null 2>&1' \
  'set -g default-command "zsh"'

set -g prefix ^A
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 50            # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g set-clipboard on
set -s copy-command 'pbcopy'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# Catppuccin base
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style "rounded"

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'false'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'

# Transparent status bar base
set -g status-style bg=default
set -g status-bg default
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 90
set -g status-interval 1
set -g window-status-separator ' '

# Catppuccin Mocha fixed palette for consistent rendering
set -g @ctp_crust '#11111b'
set -g @ctp_surface1 '#45475a'
set -g @ctp_overlay0 '#6c7086'
set -g @ctp_subtext0 '#a6adc8'
set -g @ctp_text '#cdd6f4'
set -g @ctp_blue '#89b4fa'
set -g @ctp_peach '#fab387'
set -g @ctp_lavender '#b4befe'
set -g @ctp_green '#a6e3a1'
set -g @ctp_bar '#6f8d97'

# Left cluster: launcher only (window tabs rendered by tmux window list)
set -g status-left "#[fg=#{?client_prefix,#{@ctp_peach},#{@ctp_green}},bg=default]#[fg=#{@ctp_crust},bg=#{?client_prefix,#{@ctp_peach},#{@ctp_green}},bold] #[fg=#{@ctp_surface1},bg=#{?client_prefix,#{@ctp_peach},#{@ctp_green}}]#[fg=#{@ctp_text},bg=#{@ctp_surface1},bold] #S#[fg=#{@ctp_surface1},bg=default] " 

# Expanded tabs for all windows
set -g window-status-format "#[fg=#{@ctp_surface1},bg=default]#[fg=#{@ctp_text},bg=#{@ctp_surface1}]#W #[fg=#{@ctp_blue},bg=#{@ctp_surface1}]#[fg=#{@ctp_crust},bg=#{@ctp_blue},bold] #I#[fg=#{@ctp_blue},bg=default]"
set -g window-status-current-format "#[fg=#{@ctp_surface1},bg=default]#[fg=#{@ctp_text},bg=#{@ctp_surface1},bold]#W #[fg=#{@ctp_peach},bg=#{@ctp_surface1}]#[fg=#{@ctp_crust},bg=#{@ctp_peach},bold] #I#[fg=#{@ctp_peach},bg=default]"

# Right cluster: folder + date/time
set -g status-right "#[fg=#{@ctp_lavender},bg=default]#[fg=#{@ctp_overlay0},bg=#{@ctp_lavender}] #[fg=#{@ctp_subtext0},bg=#{@ctp_surface1}] #{b:pane_current_path}#[fg=#{@ctp_surface1},bg=default] #[fg=#{@ctp_blue},bg=default]#[fg=#{@ctp_crust},bg=#{@ctp_blue}]󰃭  %Y-%m-%d#[fg=#{@ctp_blue},bg=default]"
