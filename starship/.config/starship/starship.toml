add_newline = true
palette = "catppuccin_mocha"
command_timeout = 1000

format = """
$directory$fill$git_branch$git_status$rust$python$golang$aws$gcloud$cmd_duration
$character"""

[fill]
symbol = " "

[directory]
style = "bold cyan"
format = "[$path]($style) "
truncation_length = 10
truncate_to_repo = false
truncation_symbol = ".../"

[git_commit]
tag_symbol = " ´ÉÆ "

[git_branch]
symbol = "´Éÿ "
style = "bold magenta"
format = "on [$symbol$branch]($style) "

[rust]
symbol = "­ƒªÇ "
style = "bold red"
format = "is [$symbol($version)]($style) "

[python]
symbol = "­ƒÉì "
style = "bold yellow"
format = "via [$symbol($version)]($style) "

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style) "

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"

