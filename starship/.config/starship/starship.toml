[gcloud]
format = '[$symbol$account]($style) '
symbol = "¯ƒ▒ "
disabled = false

[aws]
format = "on [$symbol$profile](bold #ff9900) [($region)](italic #ff9900) "
symbol = "¾░©Å "
disabled = false

[aws.region_aliases]
ap-southeast-1 = "¾░çº SG"
ap-southeast-2 = "¾░çº AU"
ap-northeast-1 = "¾░çº TYO"
ap-northeast-2 = "¾░çº SEL"
us-east-1 = "¾░çº VA"
us-east-2 = "¾░çº OH"
us-west-1 = "¾░çº CA"
us-west-2 = "¾░çº OR"
eu-central-1 = "¾░çº FRA"
eu-west-1 = "¾░çº IRE"

[golang]
format = "[¯ÿº ](bold cyan)"

[kubernetes]
symbol = "Ôÿ© "
disabled = false
detect_files = ["Dockerfile"]
format = '[$symbol$context( \($namespace\))]($style) '

[[kubernetes.contexts]]
context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer"
style = "green"
context_alias = "omerxx"
symbol = "´ê│ "

[docker_context]
disabled = true

